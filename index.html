<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MindMap & Notes Sync</title>
  <link rel="icon" href="assets/logo-mindmap.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/logo-mindmap.svg">
  <link rel="stylesheet" href="css/app.css?v=17">
</head>
<body class="dark">
  <script>
    if (new URLSearchParams(location.search).has('note')) {
      document.body.classList.add('note-tab');
    }
  </script>
  <div id="app">
    <!-- Mind Map Canvas -->
    <canvas id="mindmap-canvas"></canvas>

    <!-- Search Bar -->
    <div class="search-bar" id="search-bar">
      <img src="assets/logo-mindmap.svg" alt="" class="search-logo" aria-hidden="true">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="MindMap search..." autocomplete="off">
      <button class="btn-icon hidden" id="search-clear">✕</button>
      <div class="search-results hidden" id="search-results"></div>
    </div>

    <!-- Sync Status -->
    <div class="sync-status hidden" id="sync-status">☁️ Sync</div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button class="fab" id="btn-lasso" title="Sélection multiple">🟦</button>
      <button class="fab" id="btn-theme" title="Thème">☀️</button>
      <button class="fab" id="btn-history" title="Historique">🕒</button>
      <button class="fab" id="btn-diaporama" title="Diaporama">📽️</button>
      <button class="fab" id="btn-all-notes" title="Toutes les notes">📜</button>
      <button class="fab" id="btn-export" title="Exporter">📥</button>
      <button class="fab" id="btn-settings" title="Paramètres API">⚙️</button>
      <button class="fab" id="btn-backup" title="Sauvegarde">💾</button>
    </div>

    <!-- Zoom Indicator -->
    <div class="zoom-indicator" id="zoom-indicator">Zoom: 1.0x</div>

    <!-- Help Text -->
    <div class="help-text">
      <div>👆 Tap word = hear & select</div>
      <div>👆 Tap selected = open note 📝</div>
      <div>👆👆 Double click empty = add word</div>
      <div>⏳ Long press word = actions ✋</div>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay hidden" id="modal-overlay">
      <div class="modal" id="modal-content"></div>
    </div>

    <!-- Page Overlays -->
    <div class="page-overlay hidden" id="page-history"></div>
    <div class="page-overlay hidden" id="page-all-notes"></div>
    <div class="page-overlay hidden" id="page-diaporama"></div>
    <div class="page-overlay hidden" id="page-note"></div>
    <div class="page-overlay hidden" id="page-settings"></div>
    <div class="page-overlay hidden" id="page-account"></div>

    <!-- Diaporama Control Bar -->
    <div class="diaporama-controls hidden" id="diaporama-controls">
      <button class="btn-icon" id="dia-prev">⏮️</button>
      <span id="dia-counter">1 / 1</span>
      <button class="btn-icon" id="dia-next">⏭️</button>
      <span class="divider"></span>
      <button class="btn-icon" id="dia-pause">⏸️</button>
      <span class="divider"></span>
      <button class="btn-icon" id="dia-stop">⏹️</button>
    </div>
    <div class="diaporama-progress hidden" id="diaporama-progress"></div>

    <!-- Toast -->
    <div class="toast hidden" id="toast"></div>

    <!-- Image lightbox -->
    <div class="image-lightbox hidden" id="image-lightbox" aria-hidden="true">
      <button type="button" class="image-lightbox-close" id="image-lightbox-close" aria-label="Fermer">✕</button>
      <div class="image-lightbox-toolbar">
        <button type="button" class="btn-icon" id="img-zoom-out" title="Zoom arrière">−</button>
        <span id="img-zoom-level">100%</span>
        <button type="button" class="btn-icon" id="img-zoom-in" title="Zoom avant">+</button>
        <button type="button" class="btn-icon" id="img-zoom-reset" title="Réinitialiser">⟲</button>
      </div>
      <div class="image-lightbox-stage" id="image-lightbox-stage">
        <img id="image-lightbox-img" alt="">
      </div>
    </div>
  </div>

  <script src="js/sync.js?v=24"></script>
  <script src="js/app.js?v=34"></script>
</body>
</html>
