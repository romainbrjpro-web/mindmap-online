services:
  - type: web
    name: mindmap
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /opt/render/project/src/server/data
      - key: JWT_SECRET
        generateValue: true
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

# Note : le disque persistant nécessite le plan Starter (~7$/mois).
# Plan gratuit : notes conservées tant que le service tourne + sauvegardes via 👤 Mon compte.
# Pour ajouter un disque : Render → mindmap → Settings → Upgrade to Starter → Disks → Add Disk
#   Mount path : /opt/render/project/src/server/data
