services:
  - type: web
    name: mindmap
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mindmap-db
          property: connectionString
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: mindmap-db
    plan: free
    databaseName: mindmap
    user: mindmap

# PostgreSQL gratuit Render : 1 Go, persistant entre redéploiements.
# ⚠️ Expire après 30 jours — passez en plan payant (basic-256mb ~7$/mois) pour la prod.
# Alternative gratuite permanente : Neon.tech → copiez DATABASE_URL dans les variables Render.
