services:
  - type: web
    name: mindmap
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: mindmap-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /opt/render/project/src/server/data
      - key: RENDER_DISK
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

# Plan Starter (~7$/mois) + disque persistant 1 Go.
# Toutes les notes/photos sont stockées dans store.json sur le disque.
# Après upgrade : Render Dashboard → Sync Blueprint pour appliquer le disque.
