services:
  - type: web
    name: mindmap
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mindmap-db
          property: connectionString
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: mindmap-db
    plan: free
    databaseName: mindmap
    user: mindmap

# Si le déploiement échoue (limite 1 base gratuite), supprimez le bloc
# "databases" ci-dessus et la variable DATABASE_URL du service web.
# Le site démarrera quand même (stockage fichier temporaire).
# Pour une base permanente gratuite : Neon.tech → DATABASE_URL dans Render.
